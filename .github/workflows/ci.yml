name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy src

      - name: Pytest
        run: python -m pytest -q

      - name: Schema drift
        run: python scripts/project_schemas.py --check

      - name: No private dependency
        run: python scripts/check_no_private_deps.py

      - name: License allowlist
        run: python scripts/check_licenses.py
